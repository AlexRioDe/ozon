<div class="section-game">
    <div class="container">
        <h2>Потренируйся замечать <br/> важные детали </h2>
        <div class="game">
            <div class="game__info">
                <div class="game__info_title">Ищи пары!</div>
                <div class="game__info_text">Найдёшь все?<br/>
                    Сможешь выиграть подарки</div>
                <div class="game__info_box">С помощью рандомайзера
                    мы разыграем <b>100 промокодов на Ozon на сумму 1 000 рублей.</b> </div>
            </div>
            <div class="game-container">
                <div class="score-panel">
                    <span>🎯 совпадений: <span id="pairs-matched">0</span>/8</span>
                    <span>🔄 ходов: <span id="move-counter">0</span></span>
                </div>

                <div class="grid" id="grid-container"></div>

                <div class="controls">
                    <button id="reset-btn">⟳ заново</button>
                    <div class="message" id="status-message">играй</div>
                </div>
            </div>
        </div>
    </div>
</div>
