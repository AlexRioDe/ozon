<div class="section-game" id="details">
    <div class="container">
        <h2>Потренируйся замечать <br/> важные детали </h2>
        <div class="game">
            <div class="game__info">
                <div class="game__info_title">Ищи пары!</div>
                <div class="game__info_text animate">Найдёшь все?<br/>
                    Сможешь выиграть подарки</div>
                <div class="game__info_box">
                    <p>А среди всех, кто справился,<br/>

            </div>
            <div class="game-container">

                    <div class="box-done__text">Все пары собраны</div>
                    <div class="box-done__img">
                        <img src="images/box-done.png" alt="">

                    <a href="https://forms.ozon.ru/form/0a19ecf8-446e-4b3f-9119-6fb7471f7e8b" target="_blank" class="box-done__btn">Участвуй в розыгрыше <span></span></a>

    </div>
</div>
